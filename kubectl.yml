apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  labels:
    app: demo-app
spec:
  replicas: 3

  strategy:
    type: RollingUpdate
    maxSurge: 1
    maxUnavailable: 1

  selector:
    matchLabels:
      app: demo-app

  template:
    metadata:
      labels:
        app: demo-app

    spec:
      containers:
        - name: demo-app
          image: yaqublurufat/demo-app:latest
          ports:
            - containerPort: 8088

          resources:
            requests:
              memory: "216Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"